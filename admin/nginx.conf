server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy API calls to the assistant backend
    location /api/ {
        proxy_pass http://assistant:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 120s;
    }

    # Serve embed JS files directly from assistant service
    location /embed/ {
        proxy_pass http://assistant:8000/embed/;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
