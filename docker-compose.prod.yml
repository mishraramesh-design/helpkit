version: "3.9"

# HelpKit — Production Compose for Hostinger VPS
# Images pulled from Docker Hub: mishramesh/helpkit:assistant + mishramesh/helpkit:admin
#
# On VPS:
#   git clone https://github.com/mishraramesh-design/helpkit /opt/helpkit
#   cd /opt/helpkit && cp .env.example .env && nano .env
#   docker compose -f docker-compose.prod.yml pull && docker compose -f docker-compose.prod.yml up -d

services:

  mongo:
    image: mongo:7
    restart: always
    volumes:
      - mongo_data:/data/db
    networks: [hk]

  assistant:
    image: mishramesh/helpkit:assistant
    restart: always
    pull_policy: always
    environment:
      MONGO_URL: mongodb://mongo:27017
      DB_NAME: helpkit
      ADMIN_TOKEN: ${ADMIN_TOKEN:-hk-admin-token}
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
    ports:
      - "8092:8000"
    depends_on:
      - mongo
    networks: [hk]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  admin:
    image: mishramesh/helpkit:admin
    restart: always
    pull_policy: always
    ports:
      - "8091:80"
    depends_on:
      - assistant
    networks: [hk]

volumes:
  mongo_data:

networks:
  hk:
